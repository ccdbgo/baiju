<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气卡片预览 · 白驹</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    gap: 32px;
    padding: 32px;
  }

  /* ── 左侧：今日页模拟 ── */
  .page-sim {
    width: 420px;
    flex-shrink: 0;
  }

  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 32px; font-weight: 700; color: #1a1a1a; }
  .page-header p  { font-size: 16px; color: #555; margin-top: 6px; }

  /* ── 卡片基础 ── */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
    margin-bottom: 16px;
    overflow: hidden;
  }

  /* ── 天气卡片：正常 ── */
  .weather-card { background: #f0f4ff; }
  .weather-card .inner {
    padding: 14px 8px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .weather-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .weather-emoji { font-size: 32px; line-height: 1; }
  .weather-info { flex: 1; }
  .weather-main {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .weather-sub {
    font-size: 12px;
    color: rgba(26,26,26,.6);
    margin-top: 2px;
  }
  .refresh-btn {
    width: 36px; height: 36px;
    border: none; background: transparent;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(26,26,26,.4);
    font-size: 16px;
    transition: background .15s;
  }
  .refresh-btn:hover { background: rgba(0,0,0,.06); }

  /* ── 天气卡片：恶劣 ── */
  .weather-card.severe { background: #fde8e8; }
  .weather-card.severe .weather-main { color: #5c1a1a; }
  .weather-card.severe .weather-sub  { color: rgba(92,26,26,.6); }
  .weather-card.severe .refresh-btn  { color: rgba(92,26,26,.4); }

  .alert-row {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    padding-left: 2px;
  }
  .alert-icon { font-size: 14px; color: #c0392b; margin-top: 1px; flex-shrink: 0; }
  .alert-text { font-size: 12px; color: #c0392b; font-weight: 500; }

  /* ── 天气卡片：加载中 ── */
  .weather-card.loading .inner {
    flex-direction: row;
    align-items: center;
    gap: 12px;
    padding: 16px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #ccc;
    border-top-color: #6750a4;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #555; }

  /* ── 天气卡片：无权限 ── */
  .weather-card.offline .inner {
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
  }
  .offline-icon { font-size: 20px; color: #999; }
  .offline-text { font-size: 13px; color: #999; flex: 1; }

  /* ── 概览卡片占位 ── */
  .overview-card .inner {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: #6750a4; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

  /* ── 右侧：状态切换面板 ── */
  .controls {
    flex: 1;
    max-width: 320px;
  }
  .controls h2 { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; }

  .ctrl-group {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .ctrl-group h3 {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 12px 16px 8px;
  }
  .ctrl-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 12px;
    cursor: pointer;
    transition: background .1s;
  }
  .ctrl-item:hover { background: #f9f9f9; }
  .ctrl-item label { flex: 1; font-size: 14px; color: #333; cursor: pointer; }
  .ctrl-item small { display: block; font-size: 11px; color: #999; margin-top: 1px; }

  /* toggle switch */
  .toggle {
    position: relative;
    width: 40px; height: 22px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #ccc;
    border-radius: 11px;
    transition: background .2s;
    cursor: pointer;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle input:checked + .toggle-track { background: #6750a4; }
  .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

  /* state selector */
  .state-selector {
    display: flex;
    gap: 6px;
    padding: 10px 16px 14px;
    flex-wrap: wrap;
  }
  .state-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    color: #555;
  }
  .state-btn:hover { border-color: #6750a4; color: #6750a4; }
  .state-btn.active { background: #6750a4; border-color: #6750a4; color: #fff; }

  .divider { height: 1px; background: #f0f0f0; margin: 0 16px; }
</style>
</head>
<body>

<!-- 左侧：今日页模拟 -->
<div class="page-sim">
  <div class="page-header">
    <h1>今日</h1>
    <p id="date-label">4月20日 周日 &nbsp;下午好 👋</p>
  </div>

  <!-- 天气卡片（动态切换） -->
  <div id="weather-slot"></div>

  <!-- 概览卡片占位 -->
  <div class="card overview-card">
    <div class="inner">
      <div class="stat"><div class="stat-num">3</div><div class="stat-label">今日待办</div></div>
      <div class="stat"><div class="stat-num">1</div><div class="stat-label">今日日程</div></div>
      <div class="stat"><div class="stat-num">2</div><div class="stat-label">习惯打卡</div></div>
    </div>
  </div>
</div>

<!-- 右侧：控制面板 -->
<div class="controls">
  <h2>预览控制</h2>

  <div class="ctrl-group">
    <h3>显示开关</h3>
    <div class="ctrl-item" onclick="toggleWeather()">
      <label>
        显示天气预报
        <small>需要位置权限，恶劣天气时发送通知</small>
      </label>
      <label class="toggle">
        <input type="checkbox" id="show-weather" checked onchange="render()">
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="ctrl-group">
    <h3>天气状态</h3>
    <div class="state-selector">
      <button class="state-btn active" onclick="setState('normal')">☀️ 晴天</button>
      <button class="state-btn" onclick="setState('rain')">🌧️ 中雨</button>
      <button class="state-btn" onclick="setState('severe')">⛈️ 雷暴</button>
      <button class="state-btn" onclick="setState('snow')">❄️ 大雪</button>
      <button class="state-btn" onclick="setState('heat')">🌡️ 高温</button>
      <button class="state-btn" onclick="setState('wind')">💨 大风</button>
      <button class="state-btn" onclick="setState('loading')">⏳ 加载中</button>
      <button class="state-btn" onclick="setState('error')">🚫 无权限</button>
    </div>
  </div>

  <div class="ctrl-group" id="detail-panel">
    <h3>当前数据</h3>
    <div id="detail-content" style="padding:10px 16px 14px;font-size:13px;color:#555;line-height:1.8;"></div>
  </div>
</div>

<script>
  const STATES = {
    normal:  { emoji:'☀️',  label:'晴',     temp:22, feels:20, humidity:45, wind:12,  severe:false },
    rain:    { emoji:'🌧️', label:'中雨',   temp:18, feels:16, humidity:82, wind:22,  severe:false },
    severe:  { emoji:'⛈️', label:'雷暴',   temp:28, feels:32, humidity:88, wind:75,  severe:true,  alert:'雷暴天气、大风预警（75 km/h）' },
    snow:    { emoji:'❄️',  label:'大雪',   temp:-5, feels:-9, humidity:70, wind:30,  severe:true,  alert:'大雪/暴雪天气' },
    heat:    { emoji:'🌡️', label:'晴',     temp:40, feels:43, humidity:30, wind:8,   severe:true,  alert:'高温预警（40°C）' },
    wind:    { emoji:'⛅',  label:'多云',   temp:20, feels:15, humidity:55, wind:68,  severe:true,  alert:'大风预警（68 km/h）' },
    loading: null,
    error:   'error',
  };

  let currentState = 'normal';

  function setState(s) {
    currentState = s;
    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
  }

  function toggleWeather() {
    const cb = document.getElementById('show-weather');
    cb.checked = !cb.checked;
    render();
  }

  function render() {
    const show = document.getElementById('show-weather').checked;
    const slot = document.getElementById('weather-slot');
    const detail = document.getElementById('detail-content');

    if (!show) {
      slot.innerHTML = '';
      detail.innerHTML = '<span style="color:#bbb">天气卡片已隐藏</span>';
      return;
    }

    const s = STATES[currentState];

    if (s === null) {
      slot.innerHTML = `
        <div class="card weather-card loading" style="margin-bottom:16px">
          <div class="inner">
            <div class="spinner"></div>
            <span class="loading-text">正在获取天气...</span>
          </div>
        </div>`;
      detail.innerHTML = '正在请求 GPS 位置和 Open-Meteo API...';
      return;
    }

    if (s === 'error') {
      slot.innerHTML = `
        <div class="card weather-card offline" style="margin-bottom:16px">
          <div class="inner">
            <span class="offline-icon">⛔</span>
            <span class="offline-text">天气获取失败（请检查位置权限）</span>
            <button class="refresh-btn" title="重试">↻</button>
          </div>
        </div>`;
      detail.innerHTML = '位置权限被拒绝，返回 null';
      return;
    }

    const severeClass = s.severe ? ' severe' : '';
    const alertHtml = s.severe ? `
      <div class="alert-row">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">恶劣天气提醒：${s.alert}</span>
      </div>` : '';

    slot.innerHTML = `
      <div class="card weather-card${severeClass}" style="margin-bottom:16px">
        <div class="inner">
          <div class="weather-row">
            <span class="weather-emoji">${s.emoji}</span>
            <div class="weather-info">
              <div class="weather-main">${s.temp}°C &nbsp; ${s.label}</div>
              <div class="weather-sub">体感 ${s.feels}°C · 湿度 ${s.humidity}% · 风速 ${s.wind} km/h</div>
            </div>
            <button class="refresh-btn" title="刷新天气">↻</button>
          </div>
          ${alertHtml}
        </div>
      </div>`;

    detail.innerHTML = `
      天气代码 → <b>${s.label}</b><br>
      温度：<b>${s.temp}°C</b>（体感 ${s.feels}°C）<br>
      湿度：<b>${s.humidity}%</b><br>
      风速：<b>${s.wind} km/h</b><br>
      严重预警：<b style="color:${s.severe?'#c0392b':'#27ae60'}">${s.severe ? '是 → 触发通知' : '否'}</b>
    `;
  }

  // 初始化日期
  const now = new Date();
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  const h = now.getHours();
  const greeting = h < 6 ? '深夜好' : h < 12 ? '早上好 ☀️' : h < 18 ? '下午好 👋' : '晚上好 🌙';
  document.getElementById('date-label').textContent =
    `${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}  ${greeting}`;

  render();
</script>
</body>
</html>
